<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cad Dev SSO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 16px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .badge {
      display: inline-block;
      background: #0f172a;
      border: 1px solid #334155;
      color: #64748b;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 999px;
    }
    .status { margin-top: 32px; font-size: 13px; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔐</div>
    <h1>Cad Dev SSO</h1>
    <p>Identity Provider for WordPress single sign-on.<br>
       Access is managed via an allowed-emails list.</p>
    <span class="badge">Identity Provider</span>
    <div class="status">
      This service is only accessed via your WordPress plugin.<br>
      Visit your WordPress site to log in.
    </div>
  </div>
</body>
</html>
